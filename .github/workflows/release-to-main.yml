name: Release to Main

on:
  push:
    branches:
      - release

permissions:
  contents: write
  pull-requests: write

jobs:
  promote-release-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR from release to main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --base main --head release --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            AHEAD_BY=$(gh api repos/$REPO/compare/main...release --jq '.ahead_by')
            if [ "$AHEAD_BY" = "0" ]; then
              echo "Release has no new commits to promote to main"
              exit 0
            fi
            gh pr create \
              --repo "$REPO" \
              --base main \
              --head release \
              --title "release: promote release to main" \
              --body "Auto-created from release branch push.\n\nFlow: feature -> release -> main"
            PR_NUMBER=$(gh pr list --repo "$REPO" --base main --head release --json number --jq '.[0].number')
          fi
          echo "Using PR #$PR_NUMBER"

      - name: Wait for PR checks and merge to main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --base main --head release --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for release -> main"
            exit 0
          fi

          for i in $(seq 1 30); do
            STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
            if [ "$STATE" != "OPEN" ]; then
              echo "PR #$PR_NUMBER is already $STATE"
              exit 0
            fi

            TOTAL=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup --jq '[.statusCheckRollup[] | select(.name != "promote-release-to-main")] | length')
            PENDING=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup --jq '[.statusCheckRollup[] | select(.name != "promote-release-to-main" and .status != "COMPLETED")] | length')
            FAILED=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup --jq '[.statusCheckRollup[] | select(.name != "promote-release-to-main" and .status == "COMPLETED" and .conclusion != null and .conclusion != "SUCCESS" and .conclusion != "SKIPPED" and .conclusion != "NEUTRAL")] | length')

            echo "PR #$PR_NUMBER checks => total:$TOTAL pending:$PENDING failed:$FAILED"

            if [ "$FAILED" != "0" ]; then
              echo "PR #$PR_NUMBER has failing checks"
              gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup
              exit 1
            fi

            if [ "$TOTAL" != "0" ] && [ "$PENDING" = "0" ]; then
              gh pr merge "$PR_NUMBER" --repo "$REPO" --rebase --delete-branch=false
              exit 0
            fi

            sleep 10
          done

          echo "Timed out waiting for PR #$PR_NUMBER checks to finish"
          gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup
          exit 1
