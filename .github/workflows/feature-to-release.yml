name: Feature to Release

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  promote-feature-to-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR from feature to release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --base release --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            AHEAD_BY=$(gh api repos/$REPO/compare/release...$BRANCH --jq '.ahead_by')
            if [ "$AHEAD_BY" = "0" ]; then
              echo "No new commits to promote from $BRANCH to release"
              exit 0
            fi
            gh pr create \
              --repo "$REPO" \
              --base release \
              --head "$BRANCH" \
              --title "release: promote $BRANCH" \
              --body "Auto-created from feature branch push: $BRANCH.\n\nFlow: feature -> release -> main"
            PR_NUMBER=$(gh pr list --repo "$REPO" --base release --head "$BRANCH" --json number --jq '.[0].number')
          fi
          echo "Using PR #$PR_NUMBER"

      - name: Wait for PR checks and merge to release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --base release --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for $BRANCH -> release"
            exit 0
          fi

          for i in $(seq 1 30); do
            STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
            if [ "$STATE" != "OPEN" ]; then
              echo "PR #$PR_NUMBER is already $STATE"
              exit 0
            fi

            TOTAL=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup --jq '[.statusCheckRollup[] | select(.name != "promote-feature-to-release")] | length')
            PENDING=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup --jq '[.statusCheckRollup[] | select(.name != "promote-feature-to-release" and .status != "COMPLETED")] | length')
            FAILED=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup --jq '[.statusCheckRollup[] | select(.name != "promote-feature-to-release" and .status == "COMPLETED" and .conclusion != null and .conclusion != "SUCCESS" and .conclusion != "SKIPPED" and .conclusion != "NEUTRAL")] | length')

            echo "PR #$PR_NUMBER checks => total:$TOTAL pending:$PENDING failed:$FAILED"

            if [ "$FAILED" != "0" ]; then
              echo "PR #$PR_NUMBER has failing checks"
              gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup
              exit 1
            fi

            if [ "$TOTAL" != "0" ] && [ "$PENDING" = "0" ]; then
              gh pr merge "$PR_NUMBER" --repo "$REPO" --rebase --delete-branch=false
              exit 0
            fi

            sleep 10
          done

          echo "Timed out waiting for PR #$PR_NUMBER checks to finish"
          gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup
          exit 1
