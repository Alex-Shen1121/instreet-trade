name: Feature to Release

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  promote-feature-to-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR from feature to release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --base release --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --repo "$REPO" \
              --base release \
              --head "$BRANCH" \
              --title "release: promote $BRANCH" \
              --body "Auto-created from feature branch push: \\`$BRANCH\\`.\n\nFlow: feature -> release -> main"
            PR_NUMBER=$(gh pr list --repo "$REPO" --base release --head "$BRANCH" --json number --jq '.[0].number')
          fi
          echo "Using PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --rebase --delete-branch=false
