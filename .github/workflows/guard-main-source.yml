name: Main Source Guard

on:
  pull_request:
    branches:
      - main

jobs:
  guard-main-source:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure only release can target main
        run: |
          if [ "${{ github.head_ref }}" != "release" ]; then
            echo "Only release may open PRs to main. Current head: ${{ github.head_ref }}"
            exit 1
          fi
          echo "PR source is valid: release -> main"
